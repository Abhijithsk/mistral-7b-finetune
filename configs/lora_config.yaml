model_id: "mistralai/Mistral-7B-Instruct-v0.2"
output_dir: "./mistral-7b-finetuned"

dataset:
  name: "medalpaca/medical_meadow_pubmed_causal"
  subset_size: 5000
  test_size: 0.1
  max_seq_length: 2048

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]

training:
  epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  warmup_ratio: 0.03
  lr_scheduler: "cosine"
  fp16: true